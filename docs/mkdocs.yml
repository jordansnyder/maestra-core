site_name: Maestra Documentation
site_description: Documentation for the Maestra immersive experience platform
site_url: https://maestra.dev/docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: purple
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Connect Your Tool:
      - TouchDesigner: connect/touchdesigner.md
      - Max/MSP: connect/max-msp.md
      - Unreal Engine: connect/unreal.md
      - Unity: connect/unity.md
      - Arduino / ESP32: connect/arduino.md
      - Web / React / Mobile: connect/web.md
      - Python: connect/python.md
      - Raspberry Pi: connect/raspberry-pi.md
  - Core Concepts:
      - Entities & State: concepts/entities.md
      - Streams: concepts/streams.md
      - Routing: concepts/routing.md
      - Events & Messages: concepts/events.md
  - Guides:
      - Choose Your Protocol: guides/choose-your-sdk.md
      - Using the Dashboard: guides/dashboard.md
      - Node-RED Automation: guides/nodered.md
      - DMX / Art-Net Lighting: guides/dmx-gateway.md
      - Monitoring & Grafana: guides/monitoring.md
      - Streams: guides/streams.md
      - MQTT Integration: guides/mqtt.md
      - Device Registration: guides/device-registration.md
  - Setting Up Maestra:
      - Installation: setup/installation.md
      - Quick Start (Admin): setup/quickstart.md
      - Configuration: setup/configuration.md
  - Technical Reference:
      - API Reference:
          - Fleet Manager: api/fleet-manager.md
          - Entities: api/entities.md
          - Streams: api/streams.md
          - WebSocket Gateway: api/websocket.md
          - OSC Gateway: api/osc.md
      - Architecture:
          - Overview: architecture/overview.md
          - Services: architecture/services.md
      - SDK Reference:
          - Overview: sdks/overview.md
          - Python: sdks/python.md
          - JavaScript: sdks/javascript.md
          - Web: sdks/web.md
          - Arduino/ESP32: sdks/arduino.md
          - TouchDesigner: sdks/touchdesigner.md
          - Max/MSP: sdks/max-msp.md
          - Unreal Engine: sdks/unreal.md
          - Unity: sdks/unity.md
          - Raspberry Pi: sdks/raspberry-pi.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maestra/maestra-core
