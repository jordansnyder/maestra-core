# ─────────────────────────────────────────────────────────────────────────────
# Maestra DMX Gateway — Venue Patch Map
# ─────────────────────────────────────────────────────────────────────────────
#
# This file maps Maestra entity paths to physical DMX fixture addresses on an
# Art-Net node. Only this file changes between venue deployments — no code
# changes are required.
#
# BEFORE USE:
#   - Verify all channel maps against the physical fixture manuals
#   - Confirm the Art-Net node's IP address matches 'node.ip'
#   - Ensure all entity_path values exist in Maestra (run scripts/bootstrap_venue.py)
#
# ─────────────────────────────────────────────────────────────────────────────

# Human-readable venue identifier — used in logs and monitoring
venue: my-venue-name

# ─── Art-Net Node ─────────────────────────────────────────────────────────────
node:
  ip: 192.168.1.50           # Static IP — reserve this via DHCP lease on the node MAC address
  port: 6454                  # Standard Art-Net UDP port (do not change unless your node requires it)
  universe_offset: 0          # Offset subtracted from Maestra universe numbers to get Art-Net universe numbers.
                               #   0 = Maestra universe 1 → Art-Net universe 1
                               #   1 = Maestra universe 1 → Art-Net universe 0 (use if node is zero-indexed)
  keepalive_hz: 4             # How often to resend all universes when no changes occur.
                               #   Prevents the node from going dark. Recommended: 4 Hz.
  mode: unicast               # 'unicast' sends directly to node IP. Use 'broadcast' only for discovery.

# ─── Universes ────────────────────────────────────────────────────────────────
# Define each DMX universe you want to use. You can control multiple universes
# from a single node (up to the node's port count, typically 4 or 8).
universes:
  - id: 1                     # Maestra universe number (used in fixtures below)
    artnet_universe: 0        # Art-Net universe number on the node (check node documentation)
    port: 1                   # Physical DMX port on the node (1-indexed, check node label)

  # Add more universes as needed:
  # - id: 2
  #   artnet_universe: 1
  #   port: 2

# ─── Fixtures ─────────────────────────────────────────────────────────────────
# One entry per logical fixture (or per dimmer channel for dimmers).
#
# entity_path must match an entity that exists in Maestra. Create entities
# using scripts/bootstrap_venue.py or the Fleet Manager API before running
# the gateway.
#
# Channel type reference:
#   range     → 0.0–1.0 float  → DMX 0–255  (intensity, pan, tilt, zoom, etc.)
#   number    → 0–100 percent  → DMX 0–255
#   boolean   → true/false     → DMX 255 / 0
#   enum      → string label   → DMX value from enum_dmx_values table
#   color     → 0.0–1.0 float  → DMX 0–255  (use per-component variables: red, green, blue)
#
# channel_map keys are the entity variable names. offset is 1-indexed from start_channel.

fixtures:
  # ── Example: RGBW LED Par ──────────────────────────────────────────────────
  - id: par_example
    label: Example Par
    model: Generic RGBW Par
    entity_path: venue.stage.par_example    # Must match an entity in Maestra
    universe: 1                              # Must match a universe id above
    start_channel: 1                         # DMX address of channel 1 of this fixture
    mode: 4ch                                # Fixture mode — for reference only, not enforced
    channel_map:
      red:       { offset: 1, type: range }  # Channel 1: 0.0–1.0 → DMX 0–255
      green:     { offset: 2, type: range }  # Channel 2
      blue:      { offset: 3, type: range }  # Channel 3
      white:     { offset: 4, type: range }  # Channel 4

  # ── Example: Moving Head Spot ──────────────────────────────────────────────
  - id: spot_example
    label: Example Moving Spot
    model: Generic Moving Spot 15ch
    entity_path: venue.stage.spot_example
    universe: 1
    start_channel: 10
    mode: 15ch
    channel_map:
      intensity:  { offset: 1,  type: range }
      shutter:    { offset: 2,  type: range }
      color:      { offset: 3,  type: enum,
                    enum_dmx_values: { white: 0, red: 10, blue: 30, green: 50, amber: 70, uv: 90 } }
      gobo:       { offset: 5,  type: enum,
                    enum_dmx_values: { open: 0, gobo1: 16, gobo2: 32, gobo3: 48 } }
      pan:        { offset: 8,  type: range }
      pan_fine:   { offset: 9,  type: range }
      tilt:       { offset: 10, type: range }
      tilt_fine:  { offset: 11, type: range }
      speed:      { offset: 12, type: range }
      lamp:       { offset: 15, type: boolean }

  # ── Example: Dimmer Channel ────────────────────────────────────────────────
  - id: dimmer_ch1
    label: Dimmer Output 1
    model: Generic 1-Channel Dimmer
    entity_path: venue.stage.dimmer_rack.ch1
    universe: 1
    start_channel: 100
    mode: 1ch
    channel_map:
      intensity:  { offset: 1, type: range }
